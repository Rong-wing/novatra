services:
  php-fpm:
    build:
      context: .
      dockerfile: ./.dockerfile/php-fpm
    volumes:
      - ..:/var/www/html
    env_file:
      - ./.mongodb/.env  # 強制指定讀取這個位置的環境變數檔
    depends_on:
      - mongodb

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
      - ./.nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ..:/app
      - /app/node_modules # 加上這行，避免容器內的 node_modules 被覆蓋
    ports:
      - "5173:5173"
    # 這裡加入一個判斷，如果 node_modules 不存在才 install，可以加快啟動速度
    command: sh -c "if [ ! -d 'node_modules' ]; then npm install; fi && npm run dev -- --host"

volumes:
  mongo-data: