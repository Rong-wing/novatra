services:
  # 後端：純 PHP-FPM + Phalcon
  php-fpm:
    build:
      context: ..
      dockerfile: .docker/.dockerfile/php-fpm
    volumes:
      - ../backend:/var/www/html/backend
    env_file:
      - ./.mongodb/.env  # 強制指定讀取這個位置的環境變數檔
    networks:
      - backend-network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../frontend/dist:/var/www/html/frontend/dist
      - ../backend:/var/www/html/backend
      - ./.nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm
    networks:
      - backend-network

  mongodb:
    image: mongo:latest
    networks:
      - backend-network
    volumes:
      - mongo-data:/data/db

networks:
  backend-network:
    driver: bridge

volumes:
  mongo-data: