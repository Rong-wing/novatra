services:
  php-fpm:
    build:
      context: .
      dockerfile: ./.dockerfile/php-fpm
    volumes:
      - ..:/var/www/html
    env_file:
      - ./.mongodb/.env  # 強制指定讀取這個位置的環境變數檔
    depends_on:
      - mongodb

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
      - ./.nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: